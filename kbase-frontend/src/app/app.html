<div class="page-container">
  <!-- Header Bar -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo-container">
        <img src="images/icons/KBase_logo_32.png" alt="Logo">
        <span class="logo-text">KBase-web</span>
      </div>
    </div>

    <div class="header-right">
      <button id="header-login-btn" class="btn-login-outline">
        <i class="pi pi-sign-in"></i>

      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="main-content">
    <div class="welcome-card">
      <div class="card-icon-wrapper">
        <div class="card-icon-circle">
          <i class="pi pi-database"></i>
        </div>
      </div>

      <h1 class="welcome-title">Welcome to KBase</h1>

          <i class="pi pi-sign-in"></i>
          <span>Log In</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="footer-left">
      <span>Copyright © Igor Makarevich 2026</span>
    </div>
    <div class="footer-right">
      <span>Front: v.{{ version() }} | Back: v.{{ backendVersion() }} | DB: v.{{ dbVersion() }}, {{ dbDate() }}</span>
    </div>
