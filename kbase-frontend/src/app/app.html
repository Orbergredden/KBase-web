<div class="page-container">
  <!-- Header Bar -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2.5" fill="none" />
          <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
            font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="11"
            fill="currentColor">logo</text>
        </svg>
        <span class="logo-text">KBase-web</span>
      </div>
    </div>

    <div class="header-right">
      <button id="header-login-btn" class="btn-login-outline">
        <i class="pi pi-sign-in"></i>
        <span>Login</span>
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="main-content">
    <div class="welcome-card">
      <div class="card-icon-wrapper">
        <div class="card-icon-circle">
          <i class="pi pi-database"></i>
        </div>
      </div>

      <h1 class="welcome-title">Welcome to KBase</h1>
      <p class="welcome-subtitle">A modern knowledge management system built on web technologies</p>

      <div class="actions-container">
        <button id="main-login-btn" class="btn-login-primary">
          <i class="pi pi-sign-in"></i>
          <span>Log In</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="footer-left">
      <span>Copyright © Igor Makarevich 2026</span>
    </div>
    <div class="footer-right">
      <span>v.{{ version() }}</span>
    </div>
  </footer>
</div>

<router-outlet />
